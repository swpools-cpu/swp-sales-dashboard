<!DOCTYPE html>
<html><head><title>SWP Debug v2</title></head>
<body style="font-family:monospace;padding:20px;font-size:12px">
<h2>SWP Dashboard Data Debug v2</h2>
<div id="out">Loading from webhook...</div>
<script>
async function run(){
  const o = document.getElementById('out');
  try {
    const r = await fetch('https://hook.us2.make.com/xsrdp1s8ucf98pqewcgor482d73ux7yw',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({source:'debug2',ts:Date.now()})
    });
    const raw = await r.json();
    let html = '';

    // JOBS - we already know the structure
    let jobs = raw.jobs;
    if(typeof jobs==='string') try{jobs=JSON.parse(jobs)}catch(e){}
    if(jobs && jobs.results) jobs = jobs.results;
    html += '<h3>JOBS: '+((Array.isArray(jobs)?jobs.length:'?'))+' total</h3>';
    if(Array.isArray(jobs) && jobs.length){
      // Find a job with financial data
      const richJob = jobs.find(j => j.approved_estimate_total || j.last_budget_revenue) || jobs[0];
      html += '<p><b>Sample job with financials:</b> '+richJob.name+' #'+richJob.number+'</p>';
      html += '<p>approved_estimate_total='+richJob.approved_estimate_total+', approved_invoice_total='+richJob.approved_invoice_total+'</p>';
      html += '<p>last_budget_revenue='+richJob.last_budget_revenue+', last_budget_gross_profit='+richJob.last_budget_gross_profit+'</p>';
      html += '<p>last_estimate='+richJob.last_estimate+', last_invoice='+richJob.last_invoice+'</p>';
    }

    // INVOICES - deep dive
    html += '<h3>INVOICES RAW</h3>';
    html += '<p>typeof raw.invoices: '+(typeof raw.invoices)+'</p>';
    let invRaw = raw.invoices;
    html += '<p>First 500 chars of raw.invoices: '+JSON.stringify(invRaw).substring(0,500)+'</p>';
    
    let invs = invRaw;
    if(typeof invs==='string') {
      html += '<p>Invoices is a string, attempting JSON.parse...</p>';
      try{invs=JSON.parse(invs); html+='<p>Parse success, isArray: '+Array.isArray(invs)+', length: '+(invs?invs.length:'null')+'</p>';}catch(e){html+='<p>Parse failed: '+e.message+'</p>';}
    }
    if(Array.isArray(invs) && invs.length){
      const first = invs[0];
      html += '<p>typeof invs[0]: '+(typeof first)+'</p>';
      html += '<p>invs[0] constructor: '+(first && first.constructor ? first.constructor.name : 'none')+'</p>';
      html += '<p>Object.keys(invs[0]): ['+Object.keys(first||{}).join(', ')+']</p>';
      html += '<p>Object.getOwnPropertyNames(invs[0]): ['+Object.getOwnPropertyNames(first||{}).join(', ')+']</p>';
      html += '<p>JSON.stringify(invs[0]) first 800 chars:</p>';
      html += '<pre>'+JSON.stringify(first,null,2).substring(0,800)+'</pre>';
      html += '<p>JSON.stringify(invs[1]) first 800 chars:</p>';
      html += '<pre>'+JSON.stringify(invs[1],null,2).substring(0,800)+'</pre>';
    }

    // BILLS - deep dive
    html += '<h3>BILLS RAW</h3>';
    html += '<p>typeof raw.bills: '+(typeof raw.bills)+'</p>';
    let billRaw = raw.bills;
    html += '<p>First 500 chars of raw.bills: '+JSON.stringify(billRaw).substring(0,500)+'</p>';
    
    let bills = billRaw;
    if(typeof bills==='string') {
      try{bills=JSON.parse(bills); html+='<p>Parse success, isArray: '+Array.isArray(bills)+', length: '+(bills?bills.length:'null')+'</p>';}catch(e){html+='<p>Parse failed: '+e.message+'</p>';}
    }
    if(Array.isArray(bills) && bills.length){
      const first = bills[0];
      html += '<p>typeof bills[0]: '+(typeof first)+'</p>';
      html += '<p>JSON.stringify(bills[0]) first 800 chars:</p>';
      html += '<pre>'+JSON.stringify(first,null,2).substring(0,800)+'</pre>';
    }

    o.innerHTML = html;
  } catch(e) {
    o.innerHTML = '<h3 style="color:red">ERROR: '+e.message+'</h3><pre>'+e.stack+'</pre>';
  }
}
run();
</script></body></html>
