<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SW Pools - Sales & Profit Dashboard</title>
    <style>
        :root {
            --primary: #1a56db;
            --primary-light: #e8f0fe;
            --success: #16a34a;
            --success-light: #dcfce7;
            --warning: #d97706;
            --warning-light: #fef3c7;
            --danger: #dc2626;
            --danger-light: #fee2e2;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-500: #6b7280;
            --gray-700: #374151;
            --gray-900: #111827;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--gray-50);
            color: var(--gray-900);
            min-height: 100vh;
        }

        .header {
            background: white;
            border-bottom: 1px solid var(--gray-200);
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--gray-900);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .refresh-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .refresh-btn:hover { opacity: 0.9; }
        .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .last-updated {
            font-size: 12px;
            color: var(--gray-500);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Summary Cards */
        .summary-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .summary-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid var(--gray-200);
        }

        .summary-card .label {
            font-size: 12px;
            font-weight: 600;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .summary-card .value {
            font-size: 28px;
            font-weight: 700;
            margin-top: 4px;
        }

        .summary-card .sub {
            font-size: 12px;
            color: var(--gray-500);
            margin-top: 4px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            background: white;
            padding: 4px;
            border-radius: 8px;
            border: 1px solid var(--gray-200);
            width: fit-content;
        }

        .tab {
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--gray-500);
            transition: all 0.15s;
        }

        .tab.active {
            background: var(--primary);
            color: white;
        }

        .tab:hover:not(.active) {
            background: var(--gray-100);
            color: var(--gray-700);
        }

        /* Tables */
        .table-wrapper {
            background: white;
            border-radius: 10px;
            border: 1px solid var(--gray-200);
            overflow: hidden;
        }

        .table-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .table-header h2 {
            font-size: 16px;
            font-weight: 600;
        }

        .filter-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .filter-select {
            padding: 6px 12px;
            border: 1px solid var(--gray-300);
            border-radius: 6px;
            font-size: 13px;
            background: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 10px 16px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--gray-500);
            background: var(--gray-50);
            border-bottom: 1px solid var(--gray-200);
            cursor: pointer;
            user-select: none;
        }

        th:hover { color: var(--gray-700); }

        td {
            padding: 12px 16px;
            font-size: 13px;
            border-bottom: 1px solid var(--gray-100);
            vertical-align: middle;
        }

        tr:last-child td { border-bottom: none; }

        tr:hover { background: var(--gray-50); }

        /* Status Badges */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-success { background: var(--success-light); color: var(--success); }
        .badge-warning { background: var(--warning-light); color: var(--warning); }
        .badge-danger { background: var(--danger-light); color: var(--danger); }
        .badge-neutral { background: var(--gray-100); color: var(--gray-500); }

        /* Profit Bar */
        .profit-bar-container {
            width: 120px;
            height: 8px;
            background: var(--gray-200);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .profit-bar {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s;
        }

        .profit-bar.green { background: var(--success); }
        .profit-bar.yellow { background: var(--warning); }
        .profit-bar.red { background: var(--danger); }

        /* Money formatting */
        .money { font-variant-numeric: tabular-nums; }
        .money-positive { color: var(--success); }
        .money-negative { color: var(--danger); }

        /* Loading */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            flex-direction: column;
            gap: 12px;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            font-size: 14px;
            color: var(--gray-500);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 12px; }
            .summary-row { grid-template-columns: repeat(2, 1fr); }
            .table-wrapper { overflow-x: auto; }
            table { min-width: 700px; }
        }

        /* Rep card in salesperson view */
        .rep-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 16px;
        }

        .rep-card {
            background: white;
            border-radius: 10px;
            border: 1px solid var(--gray-200);
            padding: 20px;
        }

        .rep-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .rep-name {
            font-size: 16px;
            font-weight: 700;
        }

        .rep-stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--gray-100);
            font-size: 13px;
        }

        .rep-stat-row:last-child { border-bottom: none; }
        .rep-stat-label { color: var(--gray-500); }
        .rep-stat-value { font-weight: 600; }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">Loading dashboard data...</div>
    </div>

    <div class="header">
        <h1>SW Pools &mdash; Sales & Profit Dashboard</h1>
        <div class="header-right">
            <span class="last-updated" id="lastUpdated"></span>
            <button class="refresh-btn" onclick="loadData()" id="refreshBtn">
                &#8635; Refresh
            </button>
        </div>
    </div>

    <div class="container">
        <!-- Summary Cards -->
        <div class="summary-row" id="summaryRow">
            <div class="summary-card">
                <div class="label">Active Jobs</div>
                <div class="value" id="totalJobs">—</div>
                <div class="sub" id="totalJobsSub"></div>
            </div>
            <div class="summary-card">
                <div class="label">Total Estimated Revenue</div>
                <div class="value money" id="totalRevenue">—</div>
                <div class="sub" id="totalRevenueSub"></div>
            </div>
            <div class="summary-card">
                <div class="label">Total Costs Logged</div>
                <div class="value money" id="totalCosts">—</div>
                <div class="sub" id="totalCostsSub"></div>
            </div>
            <div class="summary-card">
                <div class="label">Avg Margin Health</div>
                <div class="value" id="avgMargin">—</div>
                <div class="sub" id="avgMarginSub"></div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="jobs" onclick="switchTab('jobs')">Job Profit Tracker</button>
            <button class="tab" data-tab="reps" onclick="switchTab('reps')">Salesperson Scorecard</button>
        </div>

        <!-- Jobs View -->
        <div id="jobsView">
            <div class="table-wrapper">
                <div class="table-header">
                    <h2>Active Jobs &mdash; Profit vs. Budget</h2>
                    <div class="filter-row">
                        <select class="filter-select" id="repFilter" onchange="applyFilters()">
                            <option value="">All Sales Reps</option>
                        </select>
                        <select class="filter-select" id="statusFilter" onchange="applyFilters()">
                            <option value="">All Statuses</option>
                        </select>
                        <select class="filter-select" id="healthFilter" onchange="applyFilters()">
                            <option value="">All Health</option>
                            <option value="on-track">On Track</option>
                            <option value="at-risk">At Risk</option>
                            <option value="over-budget">Over Budget</option>
                        </select>
                    </div>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th onclick="sortTable('name')">Job Name</th>
                            <th onclick="sortTable('rep')">Sales Rep</th>
                            <th onclick="sortTable('status')">Status</th>
                            <th onclick="sortTable('estimate')">Estimate</th>
                            <th onclick="sortTable('costs')">Costs to Date</th>
                            <th onclick="sortTable('remaining')">Remaining Budget</th>
                            <th onclick="sortTable('margin')">Margin</th>
                            <th>Health</th>
                        </tr>
                    </thead>
                    <tbody id="jobsTableBody">
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Reps View -->
        <div id="repsView" class="hidden">
            <div class="rep-cards" id="repCards"></div>
        </div>
    </div>

    <script>
        // Config
        const WEBHOOK_URL = 'https://hook.us2.make.com/xsrdp1s8ucf98pqewcgor482d73ux7yw';

        let allJobs = [];
        let allWorkorders = [];
        let processedJobs = [];
        let currentSort = { key: 'remaining', dir: 'asc' };

        // Active statuses that indicate a job is in progress
        const ACTIVE_STATUSES = [
            'sold', 'permitted', 'dig', 'steel', 'plumbing', 'gunite',
            'tile', 'coping', 'decking', 'plaster', 'equipment', 'startup',
            'punch list', 'in progress', 'active', 'pre-construction',
            'construction', 'finishing', 'buildout', 'scheduled'
        ];

        function formatMoney(amount) {
            if (amount === null || amount === undefined) return '$0';
            return '$' + Math.round(amount).toLocaleString();
        }

        function getMarginPercent(estimate, costs) {
            if (!estimate || estimate === 0) return 0;
            return Math.round(((estimate - costs) / estimate) * 100);
        }

        function getHealthStatus(estimate, costs) {
            if (!estimate || estimate === 0) return { label: 'No Estimate', class: 'badge-neutral', key: 'no-estimate' };
            const pctUsed = (costs / estimate) * 100;
            if (pctUsed <= 65) return { label: 'On Track', class: 'badge-success', key: 'on-track' };
            if (pctUsed <= 85) return { label: 'At Risk', class: 'badge-warning', key: 'at-risk' };
            return { label: 'Over Budget', class: 'badge-danger', key: 'over-budget' };
        }

        function processData(jobs, workorders) {
            // Index work orders by related job jnid
            const costsByJob = {};
            if (workorders && workorders.results) {
                workorders.results.forEach(wo => {
                    if (wo.related && wo.related.length > 0) {
                        const jobId = wo.related[0].id || wo.related[0];
                        if (!costsByJob[jobId]) costsByJob[jobId] = 0;
                        if (wo.items && wo.items.length > 0) {
                            wo.items.forEach(item => {
                                costsByJob[jobId] += (item.cost || 0) * (item.quantity || 1);
                            });
                        }
                    }
                });
            }

            // Process jobs
            const processed = [];
            if (jobs && jobs.results) {
                jobs.results.forEach(job => {
                    const statusName = (job.status_name || '').toLowerCase();
                    const isActive = ACTIVE_STATUSES.some(s => statusName.includes(s));
                    if (!isActive) return;

                    const estimate = job.amount || job.approved_estimate_total || job.estimate_amount || 0;
                    const costs = costsByJob[job.jnid] || 0;
                    const remaining = estimate - costs;
                    const margin = getMarginPercent(estimate, costs);
                    const health = getHealthStatus(estimate, costs);

                    processed.push({
                        jnid: job.jnid,
                        name: job.display_name || job.name || 'Unnamed Job',
                        rep: job.sales_rep_name || job.sales_rep || 'Unassigned',
                        status: job.status_name || 'Unknown',
                        estimate: estimate,
                        costs: costs,
                        remaining: remaining,
                        margin: margin,
                        health: health
                    });
                });
            }

            return processed;
        }

        function renderSummary(jobs) {
            const totalJobs = jobs.length;
            const totalRevenue = jobs.reduce((s, j) => s + j.estimate, 0);
            const totalCosts = jobs.reduce((s, j) => s + j.costs, 0);
            const jobsWithEstimate = jobs.filter(j => j.estimate > 0);
            const avgMargin = jobsWithEstimate.length > 0
                ? Math.round(jobsWithEstimate.reduce((s, j) => s + j.margin, 0) / jobsWithEstimate.length)
                : 0;

            const atRisk = jobs.filter(j => j.health.key === 'at-risk').length;
            const overBudget = jobs.filter(j => j.health.key === 'over-budget').length;

            document.getElementById('totalJobs').textContent = totalJobs;
            document.getElementById('totalJobsSub').textContent = `${atRisk} at risk, ${overBudget} over budget`;
            document.getElementById('totalRevenue').textContent = formatMoney(totalRevenue);
            document.getElementById('totalRevenueSub').textContent = `Across ${jobsWithEstimate.length} jobs with estimates`;
            document.getElementById('totalCosts').textContent = formatMoney(totalCosts);
            document.getElementById('totalCostsSub').textContent = `${formatMoney(totalRevenue - totalCosts)} remaining budget`;
            document.getElementById('avgMargin').textContent = avgMargin + '%';
            document.getElementById('avgMarginSub').textContent = avgMargin >= 30 ? 'Healthy' : avgMargin >= 20 ? 'Watch closely' : 'Below target';
        }

        function renderFilters(jobs) {
            const reps = [...new Set(jobs.map(j => j.rep))].sort();
            const statuses = [...new Set(jobs.map(j => j.status))].sort();

            const repSelect = document.getElementById('repFilter');
            repSelect.innerHTML = '<option value="">All Sales Reps</option>';
            reps.forEach(r => {
                repSelect.innerHTML += `<option value="${r}">${r}</option>`;
            });

            const statusSelect = document.getElementById('statusFilter');
            statusSelect.innerHTML = '<option value="">All Statuses</option>';
            statuses.forEach(s => {
                statusSelect.innerHTML += `<option value="${s}">${s}</option>`;
            });
        }

        function renderJobsTable(jobs) {
            const tbody = document.getElementById('jobsTableBody');
            if (jobs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--gray-500)">No active jobs found matching filters</td></tr>';
                return;
            }

            tbody.innerHTML = jobs.map(job => {
                const barPct = job.estimate > 0 ? Math.min((job.costs / job.estimate) * 100, 100) : 0;
                const barClass = job.health.key === 'on-track' ? 'green' : job.health.key === 'at-risk' ? 'yellow' : 'red';
                const remainingClass = job.remaining >= 0 ? 'money-positive' : 'money-negative';

                return `<tr>
                    <td><strong>${job.name}</strong></td>
                    <td>${job.rep}</td>
                    <td>${job.status}</td>
                    <td class="money">${formatMoney(job.estimate)}</td>
                    <td class="money">${formatMoney(job.costs)}</td>
                    <td class="money ${remainingClass}">${formatMoney(job.remaining)}</td>
                    <td>
                        <div style="display:flex;align-items:center;gap:8px">
                            <div class="profit-bar-container">
                                <div class="profit-bar ${barClass}" style="width:${barPct}%"></div>
                            </div>
                            <span style="font-size:12px">${job.margin}%</span>
                        </div>
                    </td>
                    <td><span class="badge ${job.health.class}">${job.health.label}</span></td>
                </tr>`;
            }).join('');
        }

        function renderRepCards(jobs) {
            const repMap = {};
            jobs.forEach(job => {
                if (!repMap[job.rep]) {
                    repMap[job.rep] = { jobs: [], totalEstimate: 0, totalCosts: 0 };
                }
                repMap[job.rep].jobs.push(job);
                repMap[job.rep].totalEstimate += job.estimate;
                repMap[job.rep].totalCosts += job.costs;
            });

            const container = document.getElementById('repCards');
            const reps = Object.entries(repMap).sort((a, b) => b[1].totalEstimate - a[1].totalEstimate);

            container.innerHTML = reps.map(([name, data]) => {
                const margin = getMarginPercent(data.totalEstimate, data.totalCosts);
                const remaining = data.totalEstimate - data.totalCosts;
                const atRisk = data.jobs.filter(j => j.health.key === 'at-risk' || j.health.key === 'over-budget').length;
                const healthClass = margin >= 30 ? 'badge-success' : margin >= 20 ? 'badge-warning' : 'badge-danger';
                const healthLabel = margin >= 30 ? 'Healthy' : margin >= 20 ? 'Watch' : 'Critical';

                return `<div class="rep-card">
                    <div class="rep-card-header">
                        <span class="rep-name">${name}</span>
                        <span class="badge ${healthClass}">${healthLabel}</span>
                    </div>
                    <div class="rep-stat-row">
                        <span class="rep-stat-label">Active Jobs</span>
                        <span class="rep-stat-value">${data.jobs.length}</span>
                    </div>
                    <div class="rep-stat-row">
                        <span class="rep-stat-label">Total Sold (Estimates)</span>
                        <span class="rep-stat-value">${formatMoney(data.totalEstimate)}</span>
                    </div>
                    <div class="rep-stat-row">
                        <span class="rep-stat-label">Total Costs to Date</span>
                        <span class="rep-stat-value">${formatMoney(data.totalCosts)}</span>
                    </div>
                    <div class="rep-stat-row">
                        <span class="rep-stat-label">Remaining Budget</span>
                        <span class="rep-stat-value ${remaining >= 0 ? 'money-positive' : 'money-negative'}">${formatMoney(remaining)}</span>
                    </div>
                    <div class="rep-stat-row">
                        <span class="rep-stat-label">Avg Margin</span>
                        <span class="rep-stat-value">${margin}%</span>
                    </div>
                    <div class="rep-stat-row">
                        <span class="rep-stat-label">Jobs At Risk / Over Budget</span>
                        <span class="rep-stat-value" style="color:${atRisk > 0 ? 'var(--danger)' : 'var(--success)'}">${atRisk}</span>
                    </div>
                </div>`;
            }).join('');
        }

        function applyFilters() {
            const repVal = document.getElementById('repFilter').value;
            const statusVal = document.getElementById('statusFilter').value;
            const healthVal = document.getElementById('healthFilter').value;

            let filtered = processedJobs.slice();
            if (repVal) filtered = filtered.filter(j => j.rep === repVal);
            if (statusVal) filtered = filtered.filter(j => j.status === statusVal);
            if (healthVal) filtered = filtered.filter(j => j.health.key === healthVal);

            sortJobs(filtered);
            renderJobsTable(filtered);
        }

        function sortTable(key) {
            if (currentSort.key === key) {
                currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.key = key;
                currentSort.dir = key === 'name' || key === 'rep' || key === 'status' ? 'asc' : 'desc';
            }
            applyFilters();
        }

        function sortJobs(jobs) {
            const { key, dir } = currentSort;
            jobs.sort((a, b) => {
                let aVal = a[key];
                let bVal = b[key];
                if (typeof aVal === 'string') aVal = aVal.toLowerCase();
                if (typeof bVal === 'string') bVal = bVal.toLowerCase();
                if (aVal < bVal) return dir === 'asc' ? -1 : 1;
                if (aVal > bVal) return dir === 'asc' ? 1 : -1;
                return 0;
            });
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            document.getElementById('jobsView').classList.toggle('hidden', tab !== 'jobs');
            document.getElementById('repsView').classList.toggle('hidden', tab !== 'reps');
        }

        async function loadData() {
            const overlay = document.getElementById('loadingOverlay');
            const btn = document.getElementById('refreshBtn');
            overlay.style.display = 'flex';
            btn.disabled = true;

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });

                if (!response.ok) throw new Error('Failed to fetch data');
                const data = await response.json();

                allJobs = data.jobs || data;
                allWorkorders = data.workorders || { results: [] };

                processedJobs = processData(allJobs, allWorkorders);

                // Sort by remaining budget ascending (lowest first = most at risk)
                sortJobs(processedJobs);

                renderSummary(processedJobs);
                renderFilters(processedJobs);
                renderJobsTable(processedJobs);
                renderRepCards(processedJobs);

                document.getElementById('lastUpdated').textContent = 'Updated: ' + new Date().toLocaleTimeString();
            } catch (err) {
                console.error('Load error:', err);
                document.getElementById('jobsTableBody').innerHTML =
                    `<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--danger)">
                        Error loading data. Make sure the Make.com scenario is active.<br>
                        <small style="color:var(--gray-500)">${err.message}</small>
                    </td></tr>`;
            } finally {
                overlay.style.display = 'none';
                btn.disabled = false;
            }
        }

        // Load on page open
        loadData();
    </script>
</body>
</html>
