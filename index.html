<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SW Pools - Sales &amp; Profit Dashboard</title>
<style>
:root{--navy:#0c2340;--blue:#0077b6;--blue-light:#00a8e8;--green:#2ecc71;--red:#e74c3c;--orange:#f39c12;--yellow:#f1c40f;--gray-50:#f8f9fa;--gray-100:#e9ecef;--gray-200:#dee2e6;--gray-400:#ced4da;--gray-600:#6c757d;--gray-800:#343a40;--white:#fff;--radius:8px;--shadow:0 2px 8px rgba(0,0,0,.08);--shadow-lg:0 4px 16px rgba(0,0,0,.12)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--gray-50);color:var(--gray-800);min-height:100vh}

/* HEADER */
header{background:var(--navy);color:var(--white);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:100}
header h1{font-size:18px;font-weight:700;letter-spacing:.3px}
header h1 span{color:var(--blue-light)}
.hdr-right{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.overhead-ctrl{display:flex;align-items:center;gap:6px;font-size:12px;opacity:.9}
.overhead-ctrl input{width:52px;padding:3px 5px;border:1px solid rgba(255,255,255,.3);border-radius:4px;background:rgba(255,255,255,.12);color:#fff;text-align:center;font-size:12px}
.overhead-ctrl input:focus{outline:none;border-color:var(--blue-light)}
.btn{padding:6px 14px;border:none;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-refresh{background:var(--blue);color:#fff}
.btn-refresh:hover{background:var(--blue-light)}
.btn-refresh:disabled{opacity:.5;cursor:not-allowed}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.status-msg{font-size:11px;opacity:.8}

/* TAB BAR */
.tab-bar{background:var(--white);border-bottom:1px solid var(--gray-200);padding:0 24px;display:flex;gap:0}
.tab{padding:12px 20px;font-size:13px;font-weight:600;color:var(--gray-600);cursor:pointer;border-bottom:3px solid transparent;transition:all .15s}
.tab:hover{color:var(--navy)}
.tab.active{color:var(--navy);border-bottom-color:var(--blue)}

/* SUMMARY CARDS */
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;padding:18px 24px}
.card{background:var(--white);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.card-label{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--gray-600);margin-bottom:6px}
.card-value{font-size:22px;font-weight:700;color:var(--navy)}
.card-sub{font-size:11px;color:var(--gray-600);margin-top:4px}
.card-value.green{color:var(--green)}
.card-value.red{color:var(--red)}
.card-value.blue{color:var(--blue)}

/* TABLE */
.table-wrap{padding:0 24px 24px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;background:var(--white);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
thead{background:var(--navy);color:var(--white)}
th{padding:10px 12px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.6px;cursor:pointer;white-space:nowrap;user-select:none}
th:hover{background:rgba(255,255,255,.08)}
th .sort-arrow{margin-left:4px;font-size:9px}
td{padding:9px 12px;border-bottom:1px solid var(--gray-100);white-space:nowrap}
tr:hover{background:var(--gray-50)}
tr.clickable{cursor:pointer}
.text-right{text-align:right}
.text-center{text-align:center}
.status-pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.pill-green{background:#d4edda;color:#155724}
.pill-blue{background:#cce5ff;color:#004085}
.pill-yellow{background:#fff3cd;color:#856404}
.pill-red{background:#f8d7da;color:#721c24}
.pill-gray{background:var(--gray-100);color:var(--gray-600)}
.margin-bar{display:inline-block;height:6px;border-radius:3px;min-width:4px;max-width:80px}

/* MODAL / DRILL-DOWN */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:200;justify-content:center;align-items:flex-start;padding:40px 20px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:12px;width:100%;max-width:900px;box-shadow:var(--shadow-lg);overflow:hidden}
.modal-hdr{background:var(--navy);color:var(--white);padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
.modal-hdr h2{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;color:var(--white);font-size:22px;cursor:pointer;padding:0 4px;opacity:.8}
.modal-close:hover{opacity:1}
.modal-body{padding:20px;max-height:70vh;overflow-y:auto}
.modal-section{margin-bottom:20px}
.modal-section h3{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid var(--gray-200)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 20px;font-size:13px;margin-bottom:16px}
.detail-grid dt{color:var(--gray-600);font-size:11px;text-transform:uppercase}
.detail-grid dd{font-weight:600;margin-bottom:4px}
.detail-table{width:100%;border-collapse:collapse;font-size:12px}
.detail-table th{background:var(--gray-100);color:var(--gray-800);padding:6px 10px;text-align:left;font-size:11px}
.detail-table td{padding:6px 10px;border-bottom:1px solid var(--gray-100)}

/* LOADING / ERROR */
.loading-screen{text-align:center;padding:80px 20px}
.loading-screen .spinner{width:36px;height:36px;border:3px solid var(--gray-200);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#f8d7da;border:1px solid #f5c6cb;color:#721c24;padding:16px 20px;border-radius:var(--radius);margin:20px 24px;font-size:13px}
.error-box code{display:block;margin-top:8px;padding:8px;background:rgba(0,0,0,.05);border-radius:4px;font-size:11px;white-space:pre-wrap;word-break:break-all}

/* FOOTER */
footer{text-align:center;padding:16px;font-size:11px;color:var(--gray-600);border-top:1px solid var(--gray-200);margin-top:20px}

/* RESPONSIVE */
@media(max-width:768px){
  header{padding:12px 16px}
  .summary{grid-template-columns:repeat(2,1fr);padding:12px 16px;gap:10px}
  .table-wrap{padding:0 8px 16px}
  .card-value{font-size:18px}
}
</style>
</head>
<body>

<header>
  <h1><span>SW POOLS</span> &mdash; Sales &amp; Profit Dashboard</h1>
  <div class="hdr-right">
    <div class="overhead-ctrl">
      <label>Overhead %</label>
      <input type="number" id="overheadRate" value="31" min="0" max="100" step="0.5">
    </div>
    <button class="btn btn-refresh" id="btnRefresh" onclick="loadData()">Refresh</button>
    <span class="status-msg" id="statusMsg"></span>
  </div>
</header>

<div class="tab-bar">
  <div class="tab active" data-tab="active" onclick="switchTab('active')">Active Jobs</div>
  <div class="tab" data-tab="completed" onclick="switchTab('completed')">Completed Jobs</div>
  <div class="tab" data-tab="yearly" onclick="switchTab('yearly')">2024 vs 2025</div>
</div>

<div id="summaryCards" class="summary"></div>
<div id="tableWrap" class="table-wrap"></div>
<div id="loadingArea"></div>

<!-- Drill-down modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-hdr">
      <h2 id="modalTitle">Job Details</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<footer>
  SW Pools Sales &amp; Profit Dashboard v2.0 &mdash; Data: JobNimbus + QuickBooks &mdash; Updated <span id="lastUpdated">--</span>
</footer>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────
const WEBHOOK_URL = 'https://hook.us2.make.com/xsrdp1s8ucf98pqewcgor482d73ux7yw';
const TERMINAL_STATUSES = ['Paid & Closed','Job Completed','Final Job Audit','Thank You Email/Review','Thank You Gift/Review','Equipment Warranty','Lost Sales'];
const COMPLETED_STATUSES = ['Paid & Closed','Job Completed','Final Job Audit'];

// ─── STATE ───────────────────────────────────────────────────────
let STATE = { jobs:[], workorders:[], invoices:[], bills:[], currentTab:'active', sortCol:'display_name', sortDir:1 };

// ─── UTILITY ─────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmt = n => {
  if(n==null||isNaN(n)) return '$0';
  return '$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
};
const fmtPct = n => (n==null||isNaN(n)) ? '0%' : n.toFixed(1)+'%';
const overheadRate = () => (parseFloat($('overheadRate').value)||31)/100;

function statusPill(status){
  if(!status) return '<span class="status-pill pill-gray">Unknown</span>';
  const s = status.toLowerCase();
  if(s.includes('paid')||s.includes('completed')||s.includes('closed')) return `<span class="status-pill pill-green">${status}</span>`;
  if(s.includes('permit')||s.includes('design')||s.includes('estimat')||s.includes('lead')||s.includes('appointment')) return `<span class="status-pill pill-blue">${status}</span>`;
  if(s.includes('punch')||s.includes('warranty')||s.includes('lost')) return `<span class="status-pill pill-yellow">${status}</span>`;
  return `<span class="status-pill pill-gray">${status}</span>`;
}

function marginBar(pct){
  const w = Math.min(Math.max(Math.abs(pct),2),100);
  const color = pct >= 30 ? 'var(--green)' : pct >= 15 ? 'var(--orange)' : 'var(--red)';
  return `<span class="margin-bar" style="width:${w}%;background:${color}"></span> ${fmtPct(pct)}`;
}

// ─── DATA LOADING ────────────────────────────────────────────────
async function loadData(){
  const btn = $('btnRefresh');
  const msg = $('statusMsg');
  btn.disabled = true;
  msg.textContent = 'Loading...';
  $('loadingArea').innerHTML = '<div class="loading-screen"><div class="spinner"></div><p>Fetching data from JobNimbus &amp; QuickBooks...</p></div>';
  $('summaryCards').innerHTML = '';
  $('tableWrap').innerHTML = '';

  try {
    const resp = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({source:'dashboard',ts:Date.now()})
    });
    if(!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
    const raw = await resp.json();

    // Parse response — handle both direct objects and string-wrapped JSON
    const jobs = parseSection(raw.jobs, 'results') || [];
    const workorders = parseSection(raw.workorders, 'results') || [];
    const invoices = parseJsonOrArray(raw.invoices) || [];
    const bills = parseJsonOrArray(raw.bills) || [];

    STATE.jobs = jobs;
    STATE.workorders = workorders;
    STATE.invoices = invoices;
    STATE.bills = bills;

    $('loadingArea').innerHTML = '';
    msg.innerHTML = `<span class="status-dot" style="background:var(--green)"></span> ${jobs.length} jobs, ${invoices.length} invoices, ${bills.length} bills`;
    $('lastUpdated').textContent = new Date().toLocaleString();
    render();
  } catch(e){
    $('loadingArea').innerHTML = `<div class="error-box"><strong>Failed to load data.</strong> ${e.message}<code>${e.stack||''}</code></div>`;
    msg.innerHTML = '<span class="status-dot" style="background:var(--red)"></span> Error';
  } finally {
    btn.disabled = false;
  }
}

function parseSection(data, key){
  if(!data) return [];
  if(typeof data === 'string'){
    try { data = JSON.parse(data); } catch(e){ return []; }
  }
  if(Array.isArray(data)) return data;
  if(data[key]) return Array.isArray(data[key]) ? data[key] : [data[key]];
  return [data];
}

function parseJsonOrArray(data){
  if(!data) return [];
  if(typeof data === 'string'){
    try { data = JSON.parse(data); } catch(e){ return []; }
  }
  if(Array.isArray(data)) return data;
  return [data];
}

// ─── MATCHING ENGINE ─────────────────────────────────────────────
function normalizeCustomerName(name){
  if(!name) return '';
  return name.toLowerCase().replace(/[^a-z0-9]/g,' ').replace(/\s+/g,' ').trim();
}

function buildJobFinancials(){
  const oh = overheadRate();
  const invoiceMap = {};
  const billMap = {};

  // Index invoices by normalized customer name
  STATE.invoices.forEach(inv => {
    const name = normalizeCustomerName(inv.CustomerRef?.name || inv.CustomerRef?.value || '');
    if(!name) return;
    if(!invoiceMap[name]) invoiceMap[name] = [];
    invoiceMap[name].push(inv);
  });

  // Index bills — try to match via CustomerRef or memo/description containing job name
  STATE.bills.forEach(bill => {
    const cust = normalizeCustomerName(bill.CustomerRef?.name || bill.CustomerRef?.value || '');
    if(cust){
      if(!billMap[cust]) billMap[cust] = [];
      billMap[cust].push(bill);
    }
  });

  return STATE.jobs.map(job => {
    const jobName = normalizeCustomerName(job.display_name || '');
    // Also try last name match
    const parts = jobName.split(' ');
    const lastName = parts[parts.length-1];

    // Find matching invoices
    let matchedInvoices = invoiceMap[jobName] || [];
    if(!matchedInvoices.length && lastName.length > 2){
      // Fuzzy: find any customer name containing the last name
      Object.keys(invoiceMap).forEach(k => {
        if(k.includes(lastName) && !matchedInvoices.length) matchedInvoices = invoiceMap[k];
      });
    }

    // Find matching bills
    let matchedBills = billMap[jobName] || [];
    if(!matchedBills.length && lastName.length > 2){
      Object.keys(billMap).forEach(k => {
        if(k.includes(lastName) && !matchedBills.length) matchedBills = billMap[k];
      });
    }

    const estimatedRevenue = parseFloat(job.sales_price) || parseFloat(job.estimate_total) || 0;
    const actualRevenue = matchedInvoices.reduce((s,i) => s + (parseFloat(i.TotalAmt)||0), 0);
    const actualCost = matchedBills.reduce((s,b) => s + (parseFloat(b.TotalAmt)||0), 0);
    const overheadAmt = actualCost * oh;
    const trueCost = actualCost + overheadAmt;
    const grossProfit = actualRevenue - trueCost;
    const margin = actualRevenue > 0 ? (grossProfit / actualRevenue) * 100 : 0;
    const pctInvoiced = estimatedRevenue > 0 ? (actualRevenue / estimatedRevenue) * 100 : 0;

    return {
      ...job,
      estimatedRevenue,
      actualRevenue,
      actualCost,
      overheadAmt,
      trueCost,
      grossProfit,
      margin,
      pctInvoiced,
      matchedInvoices,
      matchedBills,
      isActive: !TERMINAL_STATUSES.includes(job.status_name),
      isCompleted: COMPLETED_STATUSES.includes(job.status_name),
      jobType: job.record_type === 67 ? 'New Construction' : job.record_type === 68 ? 'Remodel' : 'Other'
    };
  });
}

// ─── RENDERING ───────────────────────────────────────────────────
function render(){
  const financials = buildJobFinancials();
  const tab = STATE.currentTab;

  if(tab === 'yearly'){
    renderYearlyComparison(financials);
    return;
  }

  const filtered = tab === 'active'
    ? financials.filter(j => j.isActive)
    : financials.filter(j => j.isCompleted);

  renderSummaryCards(filtered, tab);
  renderTable(filtered, tab);
}

function renderSummaryCards(jobs, tab){
  const totalEstimated = jobs.reduce((s,j) => s+j.estimatedRevenue, 0);
  const totalActualRev = jobs.reduce((s,j) => s+j.actualRevenue, 0);
  const totalActualCost = jobs.reduce((s,j) => s+j.trueCost, 0);
  const totalProfit = jobs.reduce((s,j) => s+j.grossProfit, 0);
  const avgMargin = totalActualRev > 0 ? (totalProfit/totalActualRev)*100 : 0;
  const jobsWithRev = jobs.filter(j => j.actualRevenue > 0).length;

  $('summaryCards').innerHTML = `
    <div class="card"><div class="card-label">${tab==='active'?'Active':'Completed'} Jobs</div><div class="card-value">${jobs.length}</div><div class="card-sub">${jobsWithRev} with QB revenue</div></div>
    <div class="card"><div class="card-label">Estimated Revenue</div><div class="card-value blue">${fmt(totalEstimated)}</div><div class="card-sub">From JN sales price</div></div>
    <div class="card"><div class="card-label">Actual Revenue</div><div class="card-value">${fmt(totalActualRev)}</div><div class="card-sub">QB invoices</div></div>
    <div class="card"><div class="card-label">True Cost</div><div class="card-value">${fmt(totalActualCost)}</div><div class="card-sub">QB bills + ${(overheadRate()*100).toFixed(0)}% overhead</div></div>
    <div class="card"><div class="card-label">Gross Profit</div><div class="card-value ${totalProfit>=0?'green':'red'}">${fmt(totalProfit)}</div><div class="card-sub">Revenue - True Cost</div></div>
    <div class="card"><div class="card-label">Avg Margin</div><div class="card-value ${avgMargin>=25?'green':avgMargin>=15?'':'red'}">${fmtPct(avgMargin)}</div><div class="card-sub">Across ${jobsWithRev} jobs</div></div>
  `;
}

function renderTable(jobs, tab){
  // Sort
  const col = STATE.sortCol;
  const dir = STATE.sortDir;
  jobs.sort((a,b) => {
    let va = a[col], vb = b[col];
    if(typeof va === 'string') va = va.toLowerCase();
    if(typeof vb === 'string') vb = vb.toLowerCase();
    if(va == null) va = '';
    if(vb == null) vb = '';
    return va < vb ? -dir : va > vb ? dir : 0;
  });

  const arrow = col => col === STATE.sortCol ? (STATE.sortDir===1?' &#9650;':' &#9660;') : '';

  const rows = jobs.map(j => `
    <tr class="clickable" onclick="openDrillDown('${j.jnid}')">
      <td>${j.display_name||'—'}</td>
      <td>${j.jobType}</td>
      <td>${statusPill(j.status_name)}</td>
      <td class="text-right">${fmt(j.estimatedRevenue)}</td>
      <td class="text-right">${fmt(j.actualRevenue)}</td>
      <td class="text-right">${fmt(j.actualCost)}</td>
      <td class="text-right">${fmt(j.trueCost)}</td>
      <td class="text-right" style="color:${j.grossProfit>=0?'var(--green)':'var(--red)'}; font-weight:600">${fmt(j.grossProfit)}</td>
      <td class="text-right">${marginBar(j.margin)}</td>
      <td class="text-center">${j.matchedInvoices.length}/${j.matchedBills.length}</td>
    </tr>
  `).join('');

  $('tableWrap').innerHTML = `
    <table>
      <thead><tr>
        <th onclick="sortBy('display_name')">Customer${arrow('display_name')}</th>
        <th onclick="sortBy('jobType')">Type${arrow('jobType')}</th>
        <th onclick="sortBy('status_name')">Status${arrow('status_name')}</th>
        <th class="text-right" onclick="sortBy('estimatedRevenue')">Est. Revenue${arrow('estimatedRevenue')}</th>
        <th class="text-right" onclick="sortBy('actualRevenue')">Actual Revenue${arrow('actualRevenue')}</th>
        <th class="text-right" onclick="sortBy('actualCost')">Direct Cost${arrow('actualCost')}</th>
        <th class="text-right" onclick="sortBy('trueCost')">True Cost${arrow('trueCost')}</th>
        <th class="text-right" onclick="sortBy('grossProfit')">Profit${arrow('grossProfit')}</th>
        <th class="text-right" onclick="sortBy('margin')">Margin${arrow('margin')}</th>
        <th class="text-center">Inv/Bills</th>
      </tr></thead>
      <tbody>${rows || '<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--gray-600)">No jobs found</td></tr>'}</tbody>
    </table>
  `;
}

function renderYearlyComparison(financials){
  // Group by year based on job date_created
  const byYear = {};
  financials.forEach(j => {
    const yr = j.date_created ? new Date(j.date_created * 1000).getFullYear() : new Date(j.created_date || 0).getFullYear();
    if(yr < 2020 || yr > 2030) return;
    if(!byYear[yr]) byYear[yr] = [];
    byYear[yr].push(j);
  });

  const years = [2024, 2025, 2026].filter(y => byYear[y]);
  const yearData = years.map(yr => {
    const jobs = byYear[yr] || [];
    const rev = jobs.reduce((s,j)=>s+j.actualRevenue,0);
    const cost = jobs.reduce((s,j)=>s+j.trueCost,0);
    const profit = jobs.reduce((s,j)=>s+j.grossProfit,0);
    const margin = rev > 0 ? (profit/rev)*100 : 0;
    return { year:yr, count:jobs.length, revenue:rev, cost, profit, margin };
  });

  $('summaryCards').innerHTML = yearData.map(d => `
    <div class="card">
      <div class="card-label">${d.year}</div>
      <div class="card-value">${d.count} Jobs</div>
      <div class="card-sub">Rev: ${fmt(d.revenue)} | Profit: ${fmt(d.profit)} | Margin: ${fmtPct(d.margin)}</div>
    </div>
  `).join('');

  // Comparison table
  const hdr = '<th>Metric</th>' + yearData.map(d=>`<th class="text-right">${d.year}</th>`).join('');
  const metrics = [
    {label:'Total Jobs', key:'count', f:v=>v},
    {label:'Actual Revenue', key:'revenue', f:fmt},
    {label:'True Cost', key:'cost', f:fmt},
    {label:'Gross Profit', key:'profit', f:fmt},
    {label:'Avg Margin', key:'margin', f:fmtPct}
  ];
  const trows = metrics.map(m => {
    const cells = yearData.map(d=>`<td class="text-right" style="font-weight:600">${m.f(d[m.key])}</td>`).join('');
    return `<tr><td style="font-weight:600">${m.label}</td>${cells}</tr>`;
  }).join('');

  $('tableWrap').innerHTML = `<table><thead><tr>${hdr}</tr></thead><tbody>${trows}</tbody></table>`;
}

// ─── DRILL-DOWN ──────────────────────────────────────────────────
function openDrillDown(jnid){
  const financials = buildJobFinancials();
  const job = financials.find(j => j.jnid === jnid);
  if(!job) return;

  $('modalTitle').textContent = `${job.display_name || 'Job'} — ${job.jobType}`;

  let html = `
    <div class="modal-section">
      <h3>Job Summary</h3>
      <dl class="detail-grid">
        <dt>Status</dt><dd>${statusPill(job.status_name)}</dd>
        <dt>Job Type</dt><dd>${job.jobType}</dd>
        <dt>Estimated Revenue</dt><dd>${fmt(job.estimatedRevenue)}</dd>
        <dt>Actual Revenue (QB)</dt><dd>${fmt(job.actualRevenue)}</dd>
        <dt>Direct Cost (QB Bills)</dt><dd>${fmt(job.actualCost)}</dd>
        <dt>Overhead (${(overheadRate()*100).toFixed(0)}%)</dt><dd>${fmt(job.overheadAmt)}</dd>
        <dt>True Cost</dt><dd>${fmt(job.trueCost)}</dd>
        <dt>Gross Profit</dt><dd style="color:${job.grossProfit>=0?'var(--green)':'var(--red)'}; font-weight:700">${fmt(job.grossProfit)}</dd>
        <dt>Margin</dt><dd>${fmtPct(job.margin)}</dd>
        <dt>% Invoiced</dt><dd>${fmtPct(job.pctInvoiced)}</dd>
      </dl>
    </div>
  `;

  // Invoice details
  if(job.matchedInvoices.length){
    const invRows = job.matchedInvoices.map(inv => {
      const lines = (inv.Line||[]).filter(l=>l.DetailType!=='SubTotalLineDetail').map(l =>
        `<tr><td>${l.Description||l.SalesItemLineDetail?.ItemRef?.name||'—'}</td><td class="text-right">${fmt(l.Amount)}</td></tr>`
      ).join('');
      return `
        <tr style="background:var(--gray-50)"><td colspan="2" style="font-weight:700">Invoice #${inv.DocNumber||inv.Id} — ${fmt(inv.TotalAmt)} ${inv.Balance>0?'(Balance: '+fmt(inv.Balance)+')':''}</td></tr>
        ${lines}
      `;
    }).join('');
    html += `<div class="modal-section"><h3>QB Invoices (${job.matchedInvoices.length})</h3><table class="detail-table"><thead><tr><th>Description</th><th class="text-right">Amount</th></tr></thead><tbody>${invRows}</tbody></table></div>`;
  } else {
    html += `<div class="modal-section"><h3>QB Invoices</h3><p style="color:var(--gray-600);font-size:13px">No matching invoices found in QuickBooks</p></div>`;
  }

  // Bill details
  if(job.matchedBills.length){
    const billRows = job.matchedBills.map(bill => {
      const lines = (bill.Line||[]).filter(l=>l.DetailType!=='SubTotalLineDetail').map(l => {
        const desc = l.Description || l.AccountBasedExpenseLineDetail?.AccountRef?.name || l.ItemBasedExpenseLineDetail?.ItemRef?.name || '—';
        return `<tr><td>${desc}</td><td>${bill.VendorRef?.name||'—'}</td><td class="text-right">${fmt(l.Amount)}</td></tr>`;
      }).join('');
      return `
        <tr style="background:var(--gray-50)"><td colspan="3" style="font-weight:700">Bill #${bill.DocNumber||bill.Id} — ${bill.VendorRef?.name||''} — ${fmt(bill.TotalAmt)}</td></tr>
        ${lines}
      `;
    }).join('');
    html += `<div class="modal-section"><h3>QB Bills (${job.matchedBills.length})</h3><table class="detail-table"><thead><tr><th>Description</th><th>Vendor</th><th class="text-right">Amount</th></tr></thead><tbody>${billRows}</tbody></table></div>`;
  } else {
    html += `<div class="modal-section"><h3>QB Bills</h3><p style="color:var(--gray-600);font-size:13px">No matching bills found in QuickBooks</p></div>`;
  }

  $('modalBody').innerHTML = html;
  $('modal').classList.add('open');
}

function closeModal(){
  $('modal').classList.remove('open');
}

// Close modal on overlay click or Escape
$('modal').addEventListener('click', e => { if(e.target === $('modal')) closeModal(); });
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); });

// ─── TAB / SORT ──────────────────────────────────────────────────
function switchTab(tab){
  STATE.currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab===tab));
  if(STATE.jobs.length) render();
}

function sortBy(col){
  if(STATE.sortCol === col) STATE.sortDir *= -1;
  else { STATE.sortCol = col; STATE.sortDir = 1; }
  render();
}

// Recalc on overhead change
$('overheadRate').addEventListener('change', () => { if(STATE.jobs.length) render(); });
$('overheadRate').addEventListener('input', () => { if(STATE.jobs.length) render(); });

// ─── INIT ────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
