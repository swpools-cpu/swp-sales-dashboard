<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SW Pools - Sales &amp; Profit Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--navy:#152d53;--navy-mid:#1a3660;--navy-light:#1f3f70;--blue:#03417f;--teal:#238baa;--teal-dim:#1a6b83;--green:#2ecc71;--red:#e05252;--orange:#e8a838;--yellow:#f1c40f;--gray-50:#f8f9fa;--gray-100:#e9ecef;--gray-200:#dee2e6;--gray-400:#ced4da;--gray-600:#7a8ea0;--gray-800:#343a40;--text-primary:#fdfdfd;--text-body:#e6e7e8;--text-secondary:#b8b8b8;--white:#fff;--radius:8px;--shadow:0 2px 8px rgba(0,0,0,.08);--shadow-lg:0 4px 16px rgba(0,0,0,.12)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Jost',sans-serif;background:var(--gray-50);color:var(--gray-800);min-height:100vh}

/* HEADER */
header{background:linear-gradient(135deg,var(--navy) 0%,var(--blue) 100%);color:var(--text-primary);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:100}
.hdr-left{display:flex;align-items:center;gap:14px}
.logo-mark{width:38px;height:38px;flex-shrink:0}
header h1{font-size:18px;font-weight:700;letter-spacing:.3px}
header h1 span{color:var(--teal)}
.hdr-right{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.overhead-ctrl{display:flex;align-items:center;gap:6px;font-size:12px;opacity:.9}
.overhead-ctrl input{width:52px;padding:3px 5px;border:1px solid rgba(255,255,255,.3);border-radius:4px;background:rgba(255,255,255,.12);color:#fff;text-align:center;font-size:12px}
.overhead-ctrl input:focus{outline:none;border-color:var(--teal)}
.filter-ctrl select{padding:4px 8px;border:1px solid rgba(255,255,255,.3);border-radius:4px;background:rgba(255,255,255,.12);color:#fff;font-size:12px;cursor:pointer}
.filter-ctrl select option{color:#333;background:#fff}
.btn{padding:6px 14px;border:none;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-refresh{background:var(--teal);color:#fff}
.btn-refresh:hover{background:var(--teal-dim)}
.btn-refresh:disabled{opacity:.5;cursor:not-allowed}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.status-msg{font-size:11px;opacity:.8}

/* TAB BAR */
.tab-bar{background:var(--white);border-bottom:1px solid var(--gray-200);padding:0 24px;display:flex;gap:0}
.tab{padding:12px 20px;font-size:13px;font-weight:600;color:var(--gray-600);cursor:pointer;border-bottom:3px solid transparent;transition:all .15s}
.tab:hover{color:var(--navy)}
.tab.active{color:var(--navy);border-bottom-color:var(--teal)}

/* SUMMARY CARDS */
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;padding:18px 24px}
.card{background:var(--white);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.card-label{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--gray-600);margin-bottom:6px}
.card-value{font-size:22px;font-weight:700;color:var(--navy)}
.card-sub{font-size:11px;color:var(--gray-600);margin-top:4px}
.card-value.green{color:var(--green)}
.card-value.red{color:var(--red)}
.card-value.blue{color:var(--teal)}
.card-value.orange{color:var(--orange)}

/* TABLE */
.table-wrap{padding:0 24px 24px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;background:var(--white);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
thead{background:var(--navy);color:var(--white)}
th{padding:10px 12px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.6px;cursor:pointer;white-space:nowrap;user-select:none}
th:hover{background:rgba(255,255,255,.08)}
th .sort-arrow{margin-left:4px;font-size:9px}
td{padding:9px 12px;border-bottom:1px solid var(--gray-100);white-space:nowrap}
tr:hover{background:var(--gray-50)}
tr.clickable{cursor:pointer}
.text-right{text-align:right}
.text-center{text-align:center}
.status-pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.pill-green{background:#d4edda;color:#155724}
.pill-blue{background:#cce5ff;color:#004085}
.pill-yellow{background:#fff3cd;color:#856404}
.pill-red{background:#f8d7da;color:#721c24}
.pill-gray{background:var(--gray-100);color:var(--gray-600)}
.pill-purple{background:#e8daef;color:#6c3483}
.margin-bar{display:inline-block;height:6px;border-radius:3px;min-width:4px;max-width:80px}
.cost-warn{color:var(--red);font-weight:700}

/* MODAL / DRILL-DOWN */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:200;justify-content:center;align-items:flex-start;padding:40px 20px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:12px;width:100%;max-width:900px;box-shadow:var(--shadow-lg);overflow:hidden}
.modal-hdr{background:var(--navy);color:var(--white);padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
.modal-hdr h2{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;color:var(--white);font-size:22px;cursor:pointer;padding:0 4px;opacity:.8}
.modal-close:hover{opacity:1}
.modal-body{padding:20px;max-height:70vh;overflow-y:auto}
.modal-section{margin-bottom:20px}
.modal-section h3{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid var(--gray-200)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 20px;font-size:13px;margin-bottom:16px}
.detail-grid dt{color:var(--gray-600);font-size:11px;text-transform:uppercase}
.detail-grid dd{font-weight:600;margin-bottom:4px}
.detail-table{width:100%;border-collapse:collapse;font-size:12px}
.detail-table th{background:var(--gray-100);color:var(--gray-800);padding:6px 10px;text-align:left;font-size:11px}
.detail-table td{padding:6px 10px;border-bottom:1px solid var(--gray-100)}
.cost-bar-wrap{margin-top:8px;background:var(--gray-100);border-radius:4px;height:20px;position:relative;overflow:hidden}
.cost-bar{height:100%;border-radius:4px;transition:width .3s}

/* LOADING / ERROR */
.loading-screen{text-align:center;padding:80px 20px}
.loading-screen .spinner{width:36px;height:36px;border:3px solid var(--gray-200);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#f8d7da;border:1px solid #f5c6cb;color:#721c24;padding:16px 20px;border-radius:var(--radius);margin:20px 24px;font-size:13px}
.error-box code{display:block;margin-top:8px;padding:8px;background:rgba(0,0,0,.05);border-radius:4px;font-size:11px;white-space:pre-wrap;word-break:break-all}

/* FOOTER */
footer{text-align:center;padding:16px;font-size:11px;color:var(--gray-600);border-top:1px solid var(--gray-200);margin-top:20px}

/* RESPONSIVE */
@media(max-width:768px){
  header{padding:12px 16px}
  .summary{grid-template-columns:repeat(2,1fr);padding:12px 16px;gap:10px}
  .table-wrap{padding:0 8px 16px}
  .card-value{font-size:18px}
}
</style>
</head>
<body>

      <defs><mask id="wm"><rect x="82" y="195" width="202" height="175" fill="white"/><path fill="black" fill-rule="evenodd" d="M160.72,259.2c31.59-0.56,57.82,27.77,86.41,39.1c0.73,0.31,1.45,0.61,2.19,0.9c9.99,3.93,20.34,5.84,30.8,6.7V198.89 H86.04V320.7c26.65-1.29,43.46-20.88,72.53-22.92h9.98c18.36,0,40.03,20.23,60.18,34.46c9,6.36,17.7,11.53,25.67,13.15 c0.7,0.14,1.39,0.26,2.08,0.35l-3.72-0.47l-4.02-0.5c-1.43-0.23-2.92-0.52-4.44-0.87c-1.5-0.34-2.95-0.73-4.33-1.14 c-0.27-0.08-0.55-0.17-0.82-0.25c-0.18-0.06-0.36-0.11-0.54-0.17c-0.18-0.06-0.35-0.11-0.53-0.17c-2.87-0.93-5.2-1.76-5.24-1.76 c-20.98-7.55-42.79-16.75-64.46-14.09c-23.85,2.18-45.96,18.95-70.81,15.45c-3.92-0.51-7.78-1.56-11.54-3.07v44.95h194.08v-49.08 c-4.07,1.15-8.59,1.8-13.35,1.8c-8.37,0-15.99-1.98-21.74-5.23c-0.01,0-0.02-0.01-0.03-0.01c-0.87-0.54-1.74-1.09-2.62-1.67 c-12.24-7.97-25.17-18.88-37.84-27.54c-8.25-6.23-20.06-13.13-33.96-17.87c-19.02-6.48-36.74-7.79-46.43-5.26 c-0.07,0-0.14-0.01-0.21-0.01C133.7,266.19,147.21,259.57,160.72,259.2z M166.8,236.18c-1.43-1.02-2.81-2.04-4.29-3.37 c-1.64-1.48-2.35-3.02-2.35-5.16c0-3.83,3.63-6.13,7.31-6.13c1.53,0,3.12,0.34,4.64,0.96l-0.3-0.7h4.85l7.41,17.83l7.67-17.83 h3.02l7.72,17.83l7.41-17.83h4.8l-10.78,25.55h-2.76l-7.92-18.35l-7.87,18.35h-2.76l-9.72-23.02l-1.27,2.68 c-1.53-0.61-2.4-1.12-4.04-1.12c-0.97,0-2.66,0.31-2.81,1.64c-0.1,1.02,0.41,1.84,1.33,2.56c1.33,1.07,2.35,1.79,3.63,2.76 c2.45,1.74,5.62,4.04,5.62,7.67c0.05,1.74-0.61,3.48-2.04,4.75c-1.74,1.58-3.42,2.2-6.23,2.2c-2.71,0-6.13-1.48-8.64-3.58 l2.66-3.58c1.12,0.82,2.09,1.53,3.12,2.04c0.92,0.51,2.15,0.87,3.37,0.87c1.07,0,1.89-0.26,2.66-1.07 c0.41-0.51,0.56-1.12,0.56-1.74C170.79,238.94,168.49,237.41,166.8,236.18z M225.37,356.73c-0.15,0.46-0.45,0.81-0.8,0.96 c-26.83,10.82-57.14,11.93-82.85-4.48c-0.34-0.21-0.59-0.62-0.69-1.1c-0.18-0.89,0.18-1.81,0.83-2.1 c26.87-11.76,57.26-12.8,82.92,4.49C225.39,354.9,225.64,355.89,225.37,356.73z"/></mask></defs>
      <rect x="86.04" y="198.89" width="194.08" height="166.76" rx="8" fill="#03417f"/>

    <h1><span>SOUTHWEST POOLS</span> &mdash; Sales &amp; Profit Dashboard</h1>
  </div>
  <div class="hdr-right">
    <div class="filter-ctrl">
      <select id="dateRange" onchange="render()">
        <option value="q1">Q1 (Jan-Mar)</option>
        <option value="q2">Q2 (Apr-Jun)</option>

      <button class="modal-close" onclick="closeModal()">&times;</button>

</div>

<footer>
  Southwest Pools &mdash; Sales &amp; Profit Dashboard v3.4 &mdash; Data: JobNimbus + QuickBooks &mdash; Updated <span id="lastUpdated">--</span>
</footer>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────
const WEBHOOK_URL = 'https://hook.us2.make.com/xsrdp1s8ucf98pqewcgor482d73ux7yw';

// Cache config — avoids re-fetching from Make.com on every page load
const CACHE_KEY    = 'swp_dash_v2';
const CACHE_MAX_MS = 6 * 60 * 60 * 1000;   // 6 hours

// Status classification
const PIPELINE_STATUSES = ['Lead','Appointment Scheduled','Design In Progress','Design Approval','Sent Estimate'];
const COMPLETED_STATUSES = ['Job Completed','Submit Final Invoice','Construction Warranty','Paid & Closed','Final Job Audit','Thank You Email/Review','Thank You Gift/Review','Equipment Warranty'];
const EXCLUDED_STATUSES = ['Lost Sales'];
// Production = everything not in Pipeline, Completed, or Excluded

// ─── STATE ───────────────────────────────────────────────────────
let STATE = { jobs:[], workorders:[], estimates:[], invoices:[], bills:[], currentTab:'production', sortCol:'name', sortDir:1, jobTypeFilter:'all' };

// ─── UTILITY ─────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmt = n => {
  if(n==null||isNaN(n)) return '$0';
  return '$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
};
const fmtPct = n => (n==null||isNaN(n)) ? '0%' : n.toFixed(1)+'%';
const overheadRate = () => (parseFloat($('overheadRate').value)||31)/100;

function statusPill(status){
  if(!status) return '<span class="status-pill pill-gray">Unknown</span>';
  const s = status.toLowerCase();
  if(s.includes('paid')||s.includes('completed')||s.includes('closed')) return `<span class="status-pill pill-green">${status}</span>`;
  if(s.includes('warranty')) return `<span class="status-pill pill-yellow">${status}</span>`;
  if(s.includes('lead')||s.includes('appointment')||s.includes('design')||s.includes('estimat')||s.includes('sent')) return `<span class="status-pill pill-blue">${status}</span>`;
  if(s.includes('punch')||s.includes('lost')) return `<span class="status-pill pill-red">${status}</span>`;
  return `<span class="status-pill pill-purple">${status}</span>`;
}

function marginBar(pct){
  const w = Math.min(Math.max(Math.abs(pct),2),100);
  const color = pct >= 30 ? 'var(--green)' : pct >= 15 ? 'var(--orange)' : 'var(--red)';
  return `<span class="margin-bar" style="width:${w}%;background:${color}"></span> ${fmtPct(pct)}`;
}

function classifyJob(status){
  if(EXCLUDED_STATUSES.includes(status)) return 'excluded';
  if(PIPELINE_STATUSES.includes(status)) return 'pipeline';
  if(COMPLETED_STATUSES.includes(status)) return 'completed';
  return 'production';
}

function daysSince(epochSec){
  if(!epochSec) return 0;
  return Math.floor((Date.now()/1000 - epochSec) / 86400);
}

function dateFilter(epochSec){
  const range = $('dateRange').value;
  if(range === 'all') return true;
  if(!epochSec) return false;
  const now = Date.now()/1000;
  const jobDate = new Date(epochSec*1000);
  const jobYr = jobDate.getFullYear();
  const jobMo = jobDate.getMonth(); // 0-11
  const thisYr = new Date().getFullYear();

  if(range === '12months') return (now - epochSec) < 365.25*86400;
  if(range === 'thisyear') return jobYr === thisYr;
  if(range === 'lastyear') return jobYr === thisYr - 1;
  if(range === 'q1') return jobYr === thisYr && jobMo >= 0 && jobMo <= 2;
  if(range === 'q2') return jobYr === thisYr && jobMo >= 3 && jobMo <= 5;
  if(range === 'q3') return jobYr === thisYr && jobMo >= 6 && jobMo <= 8;
  if(range === 'q4') return jobYr === thisYr && jobMo >= 9 && jobMo <= 11;
  return true;
}

// ─── CACHE HELPERS ───────────────────────────────────────────────
function pruneForCache(jobs, workorders, estimates, invoices, bills){
  // Strip every field the dashboard doesn't use — keeps localStorage under 5MB
  const pJobs = jobs.map(j => ({
    jnid:j.jnid, name:j.name, record_type:j.record_type, record_type_name:j.record_type_name,
    status_name:j.status_name, date_created:j.date_created, date_status_change:j.date_status_change,
    approved_estimate_total:j.approved_estimate_total
  }));
  const pWOs = workorders.map(w => ({
    jnid:w.jnid, name:w.name, record_type:w.record_type, status_name:w.status_name,
    related:w.related
  }));
  const pEst = estimates.map(e => ({
    jnid:e.jnid, number:e.number, recid:e.recid, total:e.total, cost:e.cost, margin:e.margin,
    status_name:e.status_name, date_created:e.date_created, related:e.related
  }));
  const pInv = invoices.map(i => ({
    Id:i.Id, DocNumber:i.DocNumber, TotalAmt:i.TotalAmt, Balance:i.Balance,
    TxnDate:i.TxnDate, CustomerRef:i.CustomerRef
  }));
  const pBill = bills.map(b => ({
    Id:b.Id, DocNumber:b.DocNumber, TotalAmt:b.TotalAmt, Balance:b.Balance,
    TxnDate:b.TxnDate, VendorRef:b.VendorRef, CustomerRef:b.CustomerRef,
    _custName: extractBillCustomer(b)
  }));
  return { jobs:pJobs, workorders:pWOs, estimates:pEst, invoices:pInv, bills:pBill };
}

function saveCache(jobs, workorders, estimates, invoices, bills){
  try {
    const p = pruneForCache(jobs, workorders, estimates, invoices, bills);
    const payload = JSON.stringify({ ts:Date.now(), ...p });
    localStorage.setItem(CACHE_KEY, payload);
    console.log('Cache saved: ' + (payload.length/1024).toFixed(0) + ' KB');
  } catch(e){ console.warn('Cache SAVE error: ' + e.message); }
}

function loadCache(){
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if(!raw){ console.log('Cache: empty'); return null; }
    const c = JSON.parse(raw);
    const age = Date.now() - c.ts;
    if(age > CACHE_MAX_MS){ console.log('Cache: expired (' + (age/3600000).toFixed(1) + 'h)'); return null; }
    console.log('Cache: HIT (' + (age/60000).toFixed(0) + 'm old, ' + (raw.length/1024).toFixed(0) + ' KB)');
    return c;
  } catch(e){ console.warn('Cache LOAD error: ' + e.message); return null; }
}


function cacheAge(ts){
  const mins = Math.round((Date.now() - ts) / 60000);
  if(mins < 1) return 'just now';
  if(mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins/60);
  const rm = mins % 60;
  return hrs + 'h ' + rm + 'm ago';
}

// ─── DATA LOADING ────────────────────────────────────────────────
async function loadData(forceRefresh){
  const btn = $('btnRefresh');
  const msg = $('statusMsg');

  // 1) Try cache first (unless force-refresh)
  if(!forceRefresh){
    const cached = loadCache();
    if(cached){
      applyData(cached);
      const age = cacheAge(cached.ts);
      msg.innerHTML = `<span class="status-dot" style="background:var(--teal)"></span> Cached (${age}) &mdash; ${STATE.jobs.length} jobs, ${STATE.estimates.length} est, ${STATE.invoices.length} inv, ${STATE.bills.length} bills`;
      $('lastUpdated').textContent = new Date(cached.ts).toLocaleString();
      render();
      return;
    }
  }

  // 2) Live fetch from Make.com webhook
  btn.disabled = true;
  msg.textContent = 'Fetching live data...';
  $('loadingArea').innerHTML = '<div class="loading-screen"><div class="spinner"></div><p>Fetching data from JobNimbus &amp; QuickBooks...</p></div>';
  $('summaryCards').innerHTML = '';
  $('tableWrap').innerHTML = '';

  try {
    const resp = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({source:'dashboard',ts:Date.now()})
    });
    if(!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
    const raw = await resp.json();

    const jobs       = parseSection(raw.jobs, 'results') || [];
    const workorders = parseSection(raw.workorders, 'results') || [];
    const estimates  = parseSection(raw.estimates, 'results') || [];
    const invoices   = parseJsonOrArray(raw.invoices) || [];
    const bills      = parseJsonOrArray(raw.bills) || [];

    // Apply to STATE
    STATE.jobs = jobs;
    STATE.workorders = workorders;
    STATE.estimates = estimates;
    STATE.invoices = invoices;
    STATE.bills = bills;

    // Save to cache (pruned — strips Line items to fit localStorage)
    saveCache(jobs, workorders, estimates, invoices, bills);

    $('loadingArea').innerHTML = '';
    msg.innerHTML = `<span class="status-dot" style="background:var(--green)"></span> Live &mdash; ${jobs.length} jobs, ${estimates.length} est, ${invoices.length} inv, ${bills.length} bills`;
    $('lastUpdated').textContent = new Date().toLocaleString();
    render();
  } catch(e){
    // If live fetch fails but we have ANY cache (even expired), use it
    const stale = (() => { try { const r=localStorage.getItem(CACHE_KEY); return r?JSON.parse(r):null; } catch{return null;} })();
    if(stale && stale.jobs){
      applyData(stale);
      $('loadingArea').innerHTML = '';
      msg.innerHTML = `<span class="status-dot" style="background:var(--orange)"></span> Offline — using stale cache (${cacheAge(stale.ts)})`;
      $('lastUpdated').textContent = new Date(stale.ts).toLocaleString();
      render();
    } else {
      $('loadingArea').innerHTML = `<div class="error-box"><strong>Failed to load data.</strong> ${e.message}<code>${e.stack||''}</code></div>`;
      msg.innerHTML = '<span class="status-dot" style="background:var(--red)"></span> Error';
    }
  } finally {
    btn.disabled = false;
  }
}

function applyData(d){
  STATE.jobs       = d.jobs || [];
  STATE.workorders = d.workorders || [];
  STATE.estimates  = d.estimates || [];
  STATE.invoices   = d.invoices || [];
  STATE.bills      = d.bills || [];
}

function parseSection(data, key){
  if(!data) return [];
  if(typeof data === 'string'){ try { data = JSON.parse(data); } catch(e){ return []; } }
  if(Array.isArray(data)) return data;
  if(data[key]) return Array.isArray(data[key]) ? data[key] : [data[key]];
  return [data];
}

function parseJsonOrArray(data){
  if(!data) return [];
  if(typeof data === 'string'){ try { data = JSON.parse(data); } catch(e){ return []; } }
  if(Array.isArray(data)) return data;
  return [data];
}

// ─── MATCHING ENGINE ─────────────────────────────────────────────
function normalizeCustomerName(name){
  if(!name) return '';
  // Strip parent:child QBO format — use child name
  if(name.includes(':')) name = name.split(':').pop();
  return name.toLowerCase().replace(/[^a-z0-9]/g,' ').replace(/\s+/g,' ').trim();
}

function extractBillCustomer(bill){
  // Use pre-extracted name from cache if available
  if(bill._custName) return bill._custName;
  // Extract CustomerRef from line items (QBO stores job tagging at line level)
  if(bill.Line && Array.isArray(bill.Line)){
    for(const line of bill.Line){
      const detail = line.AccountBasedExpenseLineDetail || line.ItemBasedExpenseLineDetail;
      if(detail && detail.CustomerRef){
        return detail.CustomerRef.name || detail.CustomerRef.value || '';
      }
    }
  }
  // Fallback to top-level (usually null for bills)
  return bill.CustomerRef?.name || bill.CustomerRef?.value || '';
}

function buildEstimateMap(){
  // Map job jnid -> aggregated estimate data
  // - invoicedRevenue/Cost: sum of Invoiced estimates (used for Production/Completed tabs)
  // - activeEstimates: estimates with status Sent or Approved, sorted newest-first (used for Pipeline tab)
  // - estimates[]: ALL estimates regardless of status (used for drill-down display)
  const map = {};
  STATE.estimates.forEach(est => {
    if(!est.related) return;
    const jobRel = est.related.find(r => r.type === 'job');
    if(!jobRel) return;
    const jobId = jobRel.id;
    if(!map[jobId]) map[jobId] = { 
      invoicedRevenue: 0, 
      invoicedCost: 0, 
      activeEstimates: [],
      estimates: [] 
    };
    
    // Production/Completed totals: sum Invoiced estimates only
    if(est.status_name === 'Invoiced'){
      map[jobId].invoicedRevenue += (parseFloat(est.total) || 0);
      map[jobId].invoicedCost += (parseFloat(est.cost) || 0);
    }
    
    // Pipeline candidates: active estimates (Sent or Approved)
    if(est.status_name === 'Sent' || est.status_name === 'Approved'){
      map[jobId].activeEstimates.push(est);
    }
    
    // Always include in drill-down list regardless of status
    map[jobId].estimates.push(est);
  });
  
  // Sort active estimates newest-first so [0] is the latest offer
  Object.values(map).forEach(entry => {
    entry.activeEstimates.sort((a,b) => (b.date_created||0) - (a.date_created||0));
  });
  
  return map;
}

function mapJobType(job){
  // Map JN record_type_name to dashboard display categories
  const rtn = (job.record_type_name || '').toLowerCase();
  if(job.record_type === 67 || rtn.includes('new construction')) return 'New Construction';
  if(job.record_type === 68 || rtn.includes('remodel') || rtn.includes('renovation')) return 'Remodel';
  if(rtn.includes('outdoor living')) return 'Outdoor Living';
  if(rtn.includes('service') || rtn.includes('repair') || rtn.includes('maintenance') || rtn.includes('filter')) return 'Service';
  if(rtn.includes('small job')) return 'Remodel';
  return 'Other';
}

function buildJobFinancials(){
  const oh = overheadRate();
  const invoiceMap = {};
  const billMap = {};
  const estimateMap = buildEstimateMap();

  // Index invoices by normalized customer name
  STATE.invoices.forEach(inv => {
    const name = normalizeCustomerName(inv.CustomerRef?.name || inv.CustomerRef?.value || '');
    if(!name) return;
    if(!invoiceMap[name]) invoiceMap[name] = [];
    invoiceMap[name].push(inv);
  });

  // Index bills by normalized customer name from LINE ITEMS
  STATE.bills.forEach(bill => {
    const cust = normalizeCustomerName(extractBillCustomer(bill));
    if(cust){
      if(!billMap[cust]) billMap[cust] = [];
      billMap[cust].push(bill);
    }
  });

  return STATE.jobs.map(job => {
    const jobName = normalizeCustomerName(job.name || '');
    const parts = jobName.split(' ');
    const lastName = parts[parts.length-1];

    // Match invoices
    let matchedInvoices = invoiceMap[jobName] || [];
    if(!matchedInvoices.length && lastName.length > 2){
      Object.keys(invoiceMap).forEach(k => {
        if(k.includes(lastName) && !matchedInvoices.length) matchedInvoices = invoiceMap[k];
      });
    }

    // Match bills
    let matchedBills = billMap[jobName] || [];
    if(!matchedBills.length && lastName.length > 2){
      Object.keys(billMap).forEach(k => {
        if(k.includes(lastName) && !matchedBills.length) matchedBills = billMap[k];
      });
    }

    // Estimate data (from JN estimates)
    const estData = estimateMap[job.jnid] || { invoicedRevenue:0, invoicedCost:0, activeEstimates:[], estimates:[] };
    const jobCategory = classifyJob(job.status_name);

    // Pick estimate values based on job category:
    // - Pipeline jobs: most recent active estimate (Sent or Approved)
    // - Production/Completed: sum of Invoiced estimates
    let estimatedRevenue, estimatedCost;
    if(jobCategory === 'pipeline'){
      const latest = estData.activeEstimates[0];
      estimatedRevenue = latest ? (parseFloat(latest.total)||0) : (parseFloat(job.approved_estimate_total)||0);
      estimatedCost = latest ? (parseFloat(latest.cost)||0) : 0;
    } else {
      estimatedRevenue = estData.invoicedRevenue || (parseFloat(job.approved_estimate_total) || 0);
      estimatedCost = estData.invoicedCost;
    }
    const estimatedMargin = estimatedRevenue > 0 ? ((estimatedRevenue - estimatedCost) / estimatedRevenue) * 100 : 0;

    // QB actuals
    const invoiced = matchedInvoices.reduce((s,i) => s + (parseFloat(i.TotalAmt)||0), 0);
    const collected = matchedInvoices.reduce((s,i) => s + ((parseFloat(i.TotalAmt)||0) - (parseFloat(i.Balance)||0)), 0);
    const outstanding = invoiced - collected;
    const actualCost = matchedBills.reduce((s,b) => s + (parseFloat(b.TotalAmt)||0), 0);
    const overheadAmt = actualCost * oh;
    const trueCost = actualCost + overheadAmt;
    const grossProfit = collected - trueCost;
    const margin = collected > 0 ? (grossProfit / collected) * 100 : 0;
    const pctCollected = estimatedRevenue > 0 ? (collected / estimatedRevenue) * 100 : 0;
    const costVsBudget = estimatedCost > 0 ? (actualCost / estimatedCost) * 100 : 0;

    const category = classifyJob(job.status_name);

    return {
      ...job,
      category,
      estimatedRevenue,
      estimatedCost,
      estimatedMargin,
      invoiced,
      collected,
      outstanding,
      actualCost,
      overheadAmt,
      trueCost,
      grossProfit,
      margin,
      pctCollected,
      costVsBudget,
      matchedInvoices,
      matchedBills,
      matchedEstimates: estData.estimates,
      daysInStatus: daysSince(job.date_status_change),
      jobType: mapJobType(job)
    };
  });
}

// ─── RENDERING ───────────────────────────────────────────────────
function render(){
  const financials = buildJobFinancials();
  const tab = STATE.currentTab;

  // Job Types tab uses ALL non-excluded jobs (applies its own date filter internally)
  if(tab === 'jobtypes'){
    let all = financials.filter(j => j.category !== 'excluded');
    // Apply date filter
    const range = $('dateRange').value;
    if(range !== 'all'){
      all = all.filter(j => dateFilter(j.date_created) || dateFilter(j.date_status_change));
    }
    renderJobTypeAnalysis(all);
    return;
  }

  // Filter by tab
  let filtered = financials.filter(j => j.category === tab);

  // Apply job type filter
  if(STATE.jobTypeFilter !== 'all'){
    filtered = filtered.filter(j => j.jobType === STATE.jobTypeFilter);
  }

  // Apply date filter (using date_created for pipeline, date_status_change for completed, both considered for production)
  if(tab === 'pipeline'){
    filtered = filtered.filter(j => dateFilter(j.date_created));
  } else if(tab === 'completed'){
    filtered = filtered.filter(j => dateFilter(j.date_status_change));
  } else {
    // Production: show all active production jobs regardless of date by default
    // But if user explicitly selects a date filter, apply to date_created
    const range = $('dateRange').value;
    if(range !== 'all'){
      filtered = filtered.filter(j => dateFilter(j.date_created));
    }
  }

  if(tab === 'pipeline') renderPipeline(filtered);
  else renderFinancialView(filtered, tab);
}

// ─── JOB TYPE ANALYSIS TAB ───────────────────────────────────────
function renderJobTypeAnalysis(allJobs){
  const types = ['New Construction','Remodel','Outdoor Living','Service'];
  const oh = overheadRate();

  // Build metrics per type
  const metrics = types.map(type => {
    const jobs = allJobs.filter(j => j.jobType === type);
    const count = jobs.length;
    const pipelineJobs = jobs.filter(j => j.category === 'pipeline');
    const activeJobs = jobs.filter(j => j.category === 'production');
    const completedJobs = jobs.filter(j => j.category === 'completed');
    const estRevenue = jobs.reduce((s,j) => s+j.estimatedRevenue, 0);
    const estCost = jobs.reduce((s,j) => s+j.estimatedCost, 0);
    const collected = jobs.reduce((s,j) => s+j.collected, 0);
    const actualCost = jobs.reduce((s,j) => s+j.trueCost, 0);
    const profit = jobs.reduce((s,j) => s+j.grossProfit, 0);
    const margin = collected > 0 ? (profit/collected)*100 : 0;
    const avgRevenue = count > 0 ? estRevenue/count : 0;
    const avgCollected = count > 0 ? collected/count : 0;
    const avgProfit = count > 0 ? profit/count : 0;
    const invoiced = jobs.reduce((s,j) => s+j.invoiced, 0);
    const outstanding = jobs.reduce((s,j) => s+j.outstanding, 0);
    return { type, count, pipelineJobs:pipelineJobs.length, activeJobs:activeJobs.length, completedJobs:completedJobs.length, estRevenue, estCost, collected, invoiced, outstanding, actualCost, profit, margin, avgRevenue, avgCollected, avgProfit };
  });

  // Also compute "Other" if any exist
  const otherJobs = allJobs.filter(j => !types.includes(j.jobType));
  if(otherJobs.length > 0){
    const count = otherJobs.length;
    const estRevenue = otherJobs.reduce((s,j) => s+j.estimatedRevenue, 0);
    const estCost = otherJobs.reduce((s,j) => s+j.estimatedCost, 0);
    const collected = otherJobs.reduce((s,j) => s+j.collected, 0);
    const actualCost = otherJobs.reduce((s,j) => s+j.trueCost, 0);
    const profit = otherJobs.reduce((s,j) => s+j.grossProfit, 0);
    const margin = collected > 0 ? (profit/collected)*100 : 0;
    const invoiced = otherJobs.reduce((s,j) => s+j.invoiced, 0);
    const outstanding = otherJobs.reduce((s,j) => s+j.outstanding, 0);
    metrics.push({ type:'Other', count, pipelineJobs:otherJobs.filter(j=>j.category==='pipeline').length, activeJobs:otherJobs.filter(j=>j.category==='production').length, completedJobs:otherJobs.filter(j=>j.category==='completed').length, estRevenue, estCost, collected, invoiced, outstanding, actualCost, profit, margin, avgRevenue:count?estRevenue/count:0, avgCollected:count?collected/count:0, avgProfit:count?profit/count:0 });
  }

  // Totals row
  const totals = {
    count: allJobs.length,
    estRevenue: allJobs.reduce((s,j) => s+j.estimatedRevenue, 0),
    estCost: allJobs.reduce((s,j) => s+j.estimatedCost, 0),
    collected: allJobs.reduce((s,j) => s+j.collected, 0),
    actualCost: allJobs.reduce((s,j) => s+j.trueCost, 0),
    profit: allJobs.reduce((s,j) => s+j.grossProfit, 0),
    invoiced: allJobs.reduce((s,j) => s+j.invoiced, 0)
  };
  totals.margin = totals.collected > 0 ? (totals.profit/totals.collected)*100 : 0;
  totals.avgRevenue = totals.count > 0 ? totals.estRevenue/totals.count : 0;

  // Find best-performing type by margin (min 1 job with collections)
  const withData = metrics.filter(m => m.collected > 0);
  const bestMargin = withData.length ? withData.reduce((a,b) => a.margin > b.margin ? a : b) : null;
  const bestRevenue = withData.length ? withData.reduce((a,b) => a.collected > b.collected ? a : b) : null;

  // Summary cards
  $('summaryCards').innerHTML = `
    <div class="card"><div class="card-label">Total Jobs</div><div class="card-value">${totals.count}</div><div class="card-sub">Across all types</div></div>
    <div class="card"><div class="card-label">Total Est. Revenue</div><div class="card-value blue">${fmt(totals.estRevenue)}</div><div class="card-sub">${fmt(totals.collected)} collected</div></div>
    <div class="card"><div class="card-label">Total Profit</div><div class="card-value ${totals.profit>=0?'green':'red'}">${fmt(totals.profit)}</div><div class="card-sub">${fmtPct(totals.margin)} avg margin</div></div>
    <div class="card"><div class="card-label">Best Margin</div><div class="card-value green">${bestMargin ? bestMargin.type : '—'}</div><div class="card-sub">${bestMargin ? fmtPct(bestMargin.margin) : 'No data yet'}</div></div>
    <div class="card"><div class="card-label">Top Revenue</div><div class="card-value blue">${bestRevenue ? bestRevenue.type : '—'}</div><div class="card-sub">${bestRevenue ? fmt(bestRevenue.collected)+' collected' : 'No data yet'}</div></div>
  `;

  // Comparison table
  const typeColors = {'New Construction':'var(--teal)','Remodel':'var(--orange)','Outdoor Living':'var(--green)','Service':'#8e44ad','Other':'var(--gray-600)'};

  const rows = metrics.filter(m => m.count > 0).map(m => {
    const color = typeColors[m.type] || 'var(--gray-600)';
    const pctOfRev = totals.estRevenue > 0 ? ((m.estRevenue/totals.estRevenue)*100).toFixed(0) : 0;
    return `
    <tr>
      <td><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${color};margin-right:6px;vertical-align:middle"></span><strong>${m.type}</strong></td>
      <td class="text-center">${m.count}</td>
      <td class="text-center" style="font-size:11px;color:var(--gray-600)">${m.pipelineJobs} / ${m.activeJobs} / ${m.completedJobs}</td>
      <td class="text-right">${fmt(m.estRevenue)}<div style="font-size:10px;color:var(--gray-600)">${pctOfRev}% of total</div></td>
      <td class="text-right">${fmt(m.estCost)}</td>
      <td class="text-right" style="color:var(--green)">${fmt(m.collected)}</td>
      <td class="text-right">${fmt(m.actualCost)}</td>
      <td class="text-right" style="color:${m.profit>=0?'var(--green)':'var(--red)'}; font-weight:600">${fmt(m.profit)}</td>
      <td class="text-right">${marginBar(m.margin)}</td>
      <td class="text-right">${fmt(m.avgRevenue)}</td>
      <td class="text-right" style="color:${m.avgProfit>=0?'var(--green)':'var(--red)'}">${fmt(m.avgProfit)}</td>
    </tr>`;
  }).join('');

  // Totals row
  const totalsRow = `
    <tr style="background:var(--gray-100);font-weight:700">
      <td>All Types</td>
      <td class="text-center">${totals.count}</td>
      <td class="text-center"></td>
      <td class="text-right">${fmt(totals.estRevenue)}</td>
      <td class="text-right">${fmt(totals.estCost)}</td>
      <td class="text-right" style="color:var(--green)">${fmt(totals.collected)}</td>
      <td class="text-right">${fmt(totals.actualCost)}</td>
      <td class="text-right" style="color:${totals.profit>=0?'var(--green)':'var(--red)'}">${fmt(totals.profit)}</td>
      <td class="text-right">${marginBar(totals.margin)}</td>
      <td class="text-right">${fmt(totals.avgRevenue)}</td>
      <td class="text-right">${fmt(totals.count>0?totals.profit/totals.count:0)}</td>
    </tr>`;

  $('tableWrap').innerHTML = `
    <table>
      <thead><tr>
        <th>Job Type</th>
        <th class="text-center">Jobs</th>
        <th class="text-center" style="font-size:10px">Pipeline / Active / Done</th>
        <th class="text-right">Est. Revenue</th>
        <th class="text-right">Est. Cost</th>
        <th class="text-right">Collected</th>
        <th class="text-right">Actual Cost</th>
        <th class="text-right">Profit</th>
        <th class="text-right">Margin</th>
        <th class="text-right">Avg Rev/Job</th>
        <th class="text-right">Avg Profit/Job</th>
      </tr></thead>
      <tbody>${rows}${totalsRow}</tbody>
    </table>
  `;
}

// ─── DRILL-DOWN ──────────────────────────────────────────────────
function openDrillDown(jnid){
  const financials = buildJobFinancials();
  const job = financials.find(j => j.jnid === jnid);
  if(!job) return;

  $('modalTitle').textContent = `${job.name || 'Job'} — ${job.jobType}`;

  const oh = overheadRate();
  const costPct = job.estimatedCost > 0 ? Math.min((job.actualCost/job.estimatedCost)*100, 100) : 0;
  const costBarColor = job.actualCost > job.estimatedCost ? 'var(--red)' : job.actualCost > job.estimatedCost*0.8 ? 'var(--orange)' : 'var(--green)';

  let html = `
    <div class="modal-section">
      <h3>Financial Summary</h3>
      <dl class="detail-grid">
        <dt>Status</dt><dd>${statusPill(job.status_name)}</dd>
        <dt>Job Type</dt><dd>${job.jobType}</dd>
        <dt>Est. Revenue</dt><dd>${fmt(job.estimatedRevenue)}</dd>
        <dt>Est. Cost</dt><dd>${fmt(job.estimatedCost)}</dd>
        <dt>Est. Margin</dt><dd>${fmtPct(job.estimatedMargin)}</dd>
        <dt>Invoiced</dt><dd>${fmt(job.invoiced)}</dd>
        <dt>Collected</dt><dd style="color:var(--green);font-weight:700">${fmt(job.collected)}</dd>
        <dt>Outstanding</dt><dd style="color:${job.outstanding>0?'var(--orange)':'var(--green)'}">${fmt(job.outstanding)}</dd>
        <dt>Actual Cost (Bills)</dt><dd>${fmt(job.actualCost)}</dd>
        <dt>Overhead (${(oh*100).toFixed(0)}%)</dt><dd>${fmt(job.overheadAmt)}</dd>
        <dt>True Cost</dt><dd>${fmt(job.trueCost)}</dd>
        <dt>Gross Profit</dt><dd style="color:${job.grossProfit>=0?'var(--green)':'var(--red)'}; font-weight:700">${fmt(job.grossProfit)}</dd>
        <dt>Margin</dt><dd>${fmtPct(job.margin)}</dd>
        <dt>% Collected vs Est.</dt><dd>${fmtPct(job.pctCollected)}</dd>
      </dl>
  `;

  // Cost budget bar
  if(job.estimatedCost > 0){
    html += `
      <div style="font-size:12px;color:var(--gray-600);margin-bottom:4px">Cost Budget: ${fmt(job.actualCost)} of ${fmt(job.estimatedCost)} (${job.costVsBudget.toFixed(0)}%)</div>
      <div class="cost-bar-wrap"><div class="cost-bar" style="width:${costPct}%;background:${costBarColor}"></div></div>
    `;
  }
  html += `</div>`;

  // Estimates
  if(job.matchedEstimates && job.matchedEstimates.length){
    const estRows = job.matchedEstimates.map(est =>
      `<tr><td>#${est.number||est.recid||'—'}</td><td>${est.status_name||'—'}</td><td class="text-right">${fmt(est.total)}</td><td class="text-right">${fmt(est.cost)}</td><td class="text-right">${fmtPct(est.margin)}</td></tr>`
    ).join('');
    html += `<div class="modal-section"><h3>JN Estimates (${job.matchedEstimates.length})</h3><table class="detail-table"><thead><tr><th>Number</th><th>Status</th><th class="text-right">Revenue</th><th class="text-right">Cost</th><th class="text-right">Margin</th></tr></thead><tbody>${estRows}</tbody></table></div>`;
  }

  // Invoices
  if(job.matchedInvoices.length){
    const invRows = job.matchedInvoices.map(inv => {
      const bal = parseFloat(inv.Balance)||0;
      const tot = parseFloat(inv.TotalAmt)||0;
      const paid = tot - bal;
      return `<tr><td>#${inv.DocNumber||inv.Id}</td><td class="text-right">${fmt(tot)}</td><td class="text-right" style="color:var(--green)">${fmt(paid)}</td><td class="text-right" style="color:${bal>0?'var(--orange)':'var(--green)'}">${fmt(bal)}</td></tr>`;
    }).join('');
    html += `<div class="modal-section"><h3>QB Invoices (${job.matchedInvoices.length})</h3><table class="detail-table"><thead><tr><th>Invoice</th><th class="text-right">Total</th><th class="text-right">Paid</th><th class="text-right">Balance</th></tr></thead><tbody>${invRows}</tbody></table></div>`;
  } else {
    html += `<div class="modal-section"><h3>QB Invoices</h3><p style="color:var(--gray-600);font-size:13px">No matching invoices found</p></div>`;
  }

  // Bills
  if(job.matchedBills.length){
    const billRows = job.matchedBills.map(bill =>
      `<tr><td>#${bill.DocNumber||bill.Id}</td><td>${bill.VendorRef?.name||'—'}</td><td class="text-right">${fmt(bill.TotalAmt)}</td><td>${bill.TxnDate ? new Date(bill.TxnDate).toLocaleDateString() : '—'}</td></tr>`
    ).join('');
    html += `<div class="modal-section"><h3>QB Bills (${job.matchedBills.length})</h3><table class="detail-table"><thead><tr><th>Bill</th><th>Vendor</th><th class="text-right">Amount</th><th>Date</th></tr></thead><tbody>${billRows}</tbody></table></div>`;
  } else {
    html += `<div class="modal-section"><h3>QB Bills</h3><p style="color:var(--gray-600);font-size:13px">No matching bills found</p></div>`;
  }

  $('modalBody').innerHTML = html;
  $('modal').classList.add('open');
}

function closeModal(){
  $('modal').classList.remove('open');
}

// Close modal on overlay click or Escape
$('modal').addEventListener('click', e => { if(e.target === $('modal')) closeModal(); });
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); });

// ─── TAB / SORT ──────────────────────────────────────────────────
function switchTab(tab){
  STATE.currentTab = tab;
  STATE.sortCol = 'name';
  STATE.sortDir = 1;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab===tab));
  if(STATE.jobs.length) render();
}

function sortBy(col){
  if(STATE.sortCol === col) STATE.sortDir *= -1;
  else { STATE.sortCol = col; STATE.sortDir = 1; }
  render();
}

// Recalc on overhead change
$('overheadRate').addEventListener('change', () => { if(STATE.jobs.length) render(); });
$('overheadRate').addEventListener('input', () => { if(STATE.jobs.length) render(); });

// ─── INIT ────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
